<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>January TIL - Daily Archive</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
      --sidebar-width: 200px;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      display: flex; /* 사이드바 배치를 위해 flex 사용 */
    }

    /* 📌 왼쪽 일별 사이드바 */
    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      background-color: var(--card-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      padding: 2rem 1rem;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
      padding-left: 0.5rem;
    }

    .daily-menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .daily-menu li {
      margin-bottom: 0.5rem;
    }

    .daily-menu a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      display: block;
      padding: 0.5rem;
      border-radius: 6px;
      transition: 0.2s;
    }

    .daily-menu a:hover {
      background-color: var(--border);
      color: var(--accent);
    }

    /* 📌 오른쪽 컨텐츠 영역 */
    .content-area {
      margin-left: calc(var(--sidebar-width) + 40px);
      flex: 1;
      max-width: 800px;
      padding: 3rem 2rem;
    }

    .back-home {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-home:hover { color: var(--accent); }

    .day-section {
      margin-bottom: 4rem;
      scroll-margin-top: 2rem; /* 링크 클릭 시 상단 여유 공간 */
    }

    .day-title {
      font-size: 1.8rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      color: #f0f6fc;
    }

    .post-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .tag {
      display: inline-block;
      background: rgba(56, 139, 253, 0.1);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-top: 1rem;
    }

    /* 모바일 대응 */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
      .content-area { margin-left: 0; }
    }
  </style>
</head>

      display: block;

    }

      transition: transform 0.2s, border-color 0.2s;
