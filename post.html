<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infra Security Log - View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/tomorrow-night.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

    <style>
        /* GitHub 다크 모드 배경색과 일치 */
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
        }

        /* 마크다운 스타일 커스텀 */
        .prose { max-width: none; color: #c9d1d9; }
        .prose h1, .prose h2, .prose h3 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 0.3em; }
        .prose strong { color: #f0f6fc; background: none; text-decoration: underline; text-decoration-color: #238636; }
        
        /* 코드 블록 스타일 */
        pre[class*="language-"] {
            background: #161b22 !important;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
        }
        code { color: #ff7b72 !important; background: rgba(110, 118, 129, 0.4); padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 85%; }
        
        .back-btn {
            transition: all 0.2s;
            color: #8b949e;
        }
        .back-btn:hover { color: #58a6ff; transform: translateX(-5px); }
    </style>
</head>
<body>
    <main class="max-w-4xl mx-auto px-6 py-12">
        <nav class="mb-10">
            <a href="javascript:history.back()" class="back-btn font-bold text-sm inline-flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                BACK TO LIST
            </a>
        </nav>

        <article id="content" class="prose prose-invert lg:prose-xl"></article>
    </main>

    <script>
        // 마크다운 설정 (엔터 줄바꿈 허용)
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file');

        if (filePath) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(text => {
                    // 마크다운 변환 및 출력
                    document.getElementById('content').innerHTML = marked.parse(text);
                    // 코드 하이라이팅 실행
                    Prism.highlightAll();
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = `
                        <div class="text-center py-20">
                            <h2 class="text-2xl font-bold text-red-400">⚠️ 파일을 불러올 수 없습니다.</h2>
                            <p class="mt-4 text-stone-500">경로를 확인해주세요: ${filePath}</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
